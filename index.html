<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400">
<title>Gran Filtro — Evolución del Modelo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', 'Open Sans', -apple-system, sans-serif;
    background: #0A0E12;
    color: #d4d8e0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .slide {
    width: 1400px;
    min-height: 788px;
    margin: 0 auto;
    padding: 36px 64px;
    position: relative;
  }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .header h1 span {
    color: #E6C78A;
  }
  .header .subtitle {
    font-size: 15px;
    color: #8A9BB8;
    margin-top: 6px;
    font-weight: 400;
  }
  .header .badge {
    background: rgba(230, 199, 138, 0.12);
    border: 1px solid rgba(230, 199, 138, 0.30);
    color: #E6C78A;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* MAIN LAYOUT */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 60px 1fr;
    gap: 0;
    align-items: start;
  }

  /* FUNNEL CONTAINER */
  .funnel-panel {
    background: rgba(26,36,51,0.50);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 20px 24px;
  }
  .funnel-panel.before {
    border-color: rgba(49, 69, 102, 0.40);
  }
  .funnel-panel.after {
    border-color: rgba(230, 199, 138, 0.30);
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .panel-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 4px;
  }
  .before .panel-label {
    background: rgba(49, 69, 102, 0.35);
    color: #8A9BB8;
  }
  .after .panel-label {
    background: rgba(230, 199, 138, 0.18);
    color: #E6C78A;
  }
  .panel-period {
    font-size: 14px;
    color: #8A9BB8;
    font-weight: 400;
  }

  /* FUNNEL STEPS */
  .funnel-step {
    position: relative;
    margin-bottom: 2px;
  }
  .funnel-bar {
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    position: relative;
    transition: all 0.3s;
  }
  .funnel-bar:hover {
    filter: brightness(1.15);
  }
  .step-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .step-name {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .step-volume {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }

  /* Conversion arrows between steps */
  .conversion-row {
    display: flex;
    align-items: center;
    padding: 0 0 0 20px;
    gap: 8px;
    height: 18px;
  }
  .conversion-arrow {
    color: #4A5D75;
    font-size: 11px;
  }
  .conversion-rate {
    font-size: 12px;
    font-weight: 600;
    color: #8A9BB8;
  }

  /* FUNNEL BARS - Before panel (subtle gray/blue) */
  .before .bar-leads { background: linear-gradient(90deg, rgba(49,69,102,0.20), rgba(49,69,102,0.35)); width: 100%; }
  .before .bar-mqls { background: linear-gradient(90deg, rgba(49,69,102,0.25), rgba(49,69,102,0.40)); width: 85%; }
  .before .bar-sqls { background: linear-gradient(90deg, rgba(49,69,102,0.30), rgba(49,69,102,0.50)); width: 30%; }
  .before .bar-clientes { background: linear-gradient(90deg, rgba(49,69,102,0.35), rgba(49,69,102,0.55)); width: 20%; }
  .before .bar-aum { background: linear-gradient(90deg, rgba(49,69,102,0.40), rgba(49,69,102,0.60)); width: 50%; }

  /* FUNNEL BARS - After panel (warm gold gradient) */
  .after .bar-mqls { background: linear-gradient(90deg, rgba(230,199,138,0.18), rgba(230,199,138,0.32)); width: 85%; }
  .after .bar-sqls { background: linear-gradient(90deg, rgba(230,199,138,0.22), rgba(230,199,138,0.38)); width: 40%; }
  .after .bar-clientes { background: linear-gradient(90deg, rgba(230,199,138,0.28), rgba(230,199,138,0.45)); width: 25%; }
  .after .bar-aum { background: linear-gradient(90deg, rgba(230,199,138,0.32), rgba(230,199,138,0.50)); width: 55%; }

  /* DELTA BADGES */
  .delta-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .delta-down {
    background: rgba(49, 69, 102, 0.35);
    color: #8A9BB8;
  }
  .delta-up {
    background: rgba(230, 199, 138, 0.18);
    color: #E6C78A;
  }</style>
</head>
<body>
</body>
</html>
